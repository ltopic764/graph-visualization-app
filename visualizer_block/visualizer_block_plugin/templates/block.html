<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        #viz-scroll { width: 100%; height: 100%; overflow: hidden; background: #fafafa; }
        #viz-svg { display: block; background: #fafafa; border: 1px solid #eee; cursor: grab; touch-action: none; }
        #viz-svg:active { cursor: grabbing; }

        /* Node styles */
        .block-container {
            border: 1px solid #333;
            background-color: #fff;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .block-header {
            background-color: #34495e;
            color: white;
            padding: 2px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .attr-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        .attr-table td {
            border-bottom: 1px solid #eee;
            padding: 2px 4px;
            white-space: nowrap;
        }
        .key { font-weight: bold; color: #555; }
        .val { color: #000; text-align: right; }

        /* Edge interaction styles - Keep new functionality */
        .edge-group { cursor: help; }
        .edge-hitbox {
            stroke: transparent;
            stroke-width: 15px;
            fill: none;
            pointer-events: stroke;
        }
        .edge-line {
            stroke: #333;
            stroke-opacity: 0.6;
            pointer-events: none;
            transition: stroke 0.2s, stroke-width 0.2s;
        }
        .edge-group:hover .edge-line {
            stroke: #ff9800;
            stroke-opacity: 1;
            /* Scale stroke-width slightly on hover */
            stroke-width: {{ 2.5 * scale }};
        }

        .attr-scroll-area {
            flex: 1;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        .scroll-active {
            overflow-y: auto;
        }

        .scroll-active::-webkit-scrollbar { width: 4px; }
        .scroll-active::-webkit-scrollbar-thumb { background: #888; border-radius: 2px; }

        foreignObject.gv-node { cursor: move; }
        foreignObject.gv-node.selected .block-container {
            outline: 3px solid #ff6a00;
            outline-offset: -3px;
            box-shadow: 0 0 0 2px rgba(255, 106, 0, 0.15);
        }

        /* Tooltip styles */
        #viz-tooltip {
            position: fixed;
            display: none;
            max-width: 320px;
            z-index: 1000;
            background: #fff;
            border: 1px solid #d0d0d0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            padding: 8px 10px;
            border-radius: 6px;
            pointer-events: none;
            font: 12px/1.35 Arial, sans-serif;
            color: #222;
            white-space: pre-line;
        }
        #viz-tooltip .tooltip-title {
            font-weight: 700;
            margin-bottom: 4px;
            color: #111;
        }
        .tooltip-attr { margin-top: 2px; }
        .tooltip-attr b { color: #555; }
    </style>
</head>
<body>
<div id="viz-scroll">
    <svg id="viz-svg" width="{{ width }}" height="{{ height }}" data-zoom-scale="1" data-pan-x="0" data-pan-y="0">
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7"
                    refX="{{ (block_w / scale) / 2 + 3 }}" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
                <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
            </marker>
        </defs>

        <g id="viz-root">
            <g id="viz-edges">
                {% for edge in edges %}
                    {% set src = positions[edge.source] %}
                    {% set dst = positions[edge.target] %}
                    <g class="edge-group"
                       data-edge-id="{{ edge.edge_id }}"
                       data-source="{{ edge.source }}"
                       data-target="{{ edge.target }}"
                       data-attrs='{{ edge.attributes|default({})|tojson }}'>

                        <line class="edge-hitbox"
                              x1="{{ src.x }}" y1="{{ src.y }}"
                              x2="{{ dst.x }}" y2="{{ dst.y }}" />

                        <line class="edge-line"
                              x1="{{ src.x }}" y1="{{ src.y }}"
                              x2="{{ dst.x }}" y2="{{ dst.y }}"
                              stroke-width="{{ 1.5 * scale }}"
                              {% if directed %} marker-end="url(#arrowhead)" {% endif %} />
                    </g>
                {% endfor %}
            </g>

            <g id="viz-nodes">
                {% for node in nodes %}
                    {% set pos = positions[node.node_id] %}
                    <foreignObject x="{{ pos.top_x }}" y="{{ pos.top_y }}"
                                   width="{{ block_w }}" height="{{ block_h }}"
                                   class="gv-node"
                                   id="node-{{ node.node_id }}"
                                   data-node-id="{{ node.node_id }}"
                                   data-attrs='{{ node.attributes|default({})|tojson }}'>

                        <div xmlns="http://www.w3.org/1999/xhtml" class="block-container"
                             style="font-size: {{ font_size }}px;">

                            <div class="block-header">
                                {{ node.label if node.label else node.node_id }}
                            </div>

                            <div class="attr-scroll-area {{ 'scroll-active' if node.needs_scroll else '' }}">
                                <table class="attr-table">
                                    {% if node.attributes %}
                                        {% for key, value in node.attributes.items() %}
                                        <tr>
                                            <td class="key">{{ key }}</td>
                                            <td class="val">{{ value }}</td>
                                        </tr>
                                        {% endfor %}
                                    {% else %}
                                        <tr>
                                            <td colspan="2" style="text-align:center; color: #999; padding-top: 10px;">
                                                No attributes
                                            </td>
                                        </tr>
                                    {% endif %}
                                </table>
                            </div>
                        </div>
                    </foreignObject>
                {% endfor %}
            </g>
        </g>
    </svg>
</div>
<div id="viz-tooltip" role="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    (function () {
        "use strict";

        if (!window.d3) return;

        const svgEl = document.getElementById("viz-svg");
        const scrollContainer = document.getElementById("viz-scroll");
        const tooltipEl = document.getElementById("viz-tooltip");
        if (!svgEl || !scrollContainer || !tooltipEl) return;

        const svg = d3.select(svgEl);
        const root = d3.select("#viz-root");
        const nodeSelection = d3.selectAll(".gv-node");
        const edgeGroups = d3.selectAll(".edge-group");

        const nodePositions = new Map();
        const edgesByNode = new Map();
        let selectedNodeId = null;
        let currentTransform = d3.zoomIdentity;

        // --- Utility Functions ---

        function escapeHtml(value) {
            return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }

        function parseFloatSafe(value, fallback) {
            const parsed = parseFloat(String(value || ""));
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        function readAttrs(el) {
            try { return JSON.parse(el.getAttribute("data-attrs")) || {}; } catch(e) { return {}; }
        }

        // --- Initialization ---

        nodeSelection.each(function () {
            const nodeId = this.getAttribute("data-node-id");
            if (nodeId) {
                nodePositions.set(nodeId, {
                    x: parseFloatSafe(this.getAttribute("x"), 0),
                    y: parseFloatSafe(this.getAttribute("y"), 0),
                    width: parseFloatSafe(this.getAttribute("width"), 0),
                    height: parseFloatSafe(this.getAttribute("height"), 0)
                });
            }
        });

        edgeGroups.each(function () {
            const source = this.getAttribute("data-source");
            const target = this.getAttribute("data-target");
            if (!source || !target) return;
            if (!edgesByNode.has(source)) edgesByNode.set(source, []);
            if (!edgesByNode.has(target)) edgesByNode.set(target, []);
            edgesByNode.get(source).push(this);
            edgesByNode.get(target).push(this);
        });

        // --- Core Logic ---

        function getNodeCenter(nodeId) {
            const pos = nodePositions.get(nodeId);
            if (!pos) return null;
            return { x: pos.x + (pos.width / 2), y: pos.y + (pos.height / 2) };
        }

        function updateEdgeGroup(group) {
            const source = group.getAttribute("data-source");
            const target = group.getAttribute("data-target");
            const sCenter = getNodeCenter(source);
            const tCenter = getNodeCenter(target);
            if (sCenter && tCenter) {
                d3.select(group).selectAll("line")
                    .attr("x1", sCenter.x).attr("y1", sCenter.y)
                    .attr("x2", tCenter.x).attr("y2", tCenter.y);
            }
        }

        function updateEdgesForNode(nodeId) {
            const edges = edgesByNode.get(nodeId) || [];
            edges.forEach(updateEdgeGroup);
        }

        /**
         * Unified transform application to keep bird view in sync.
         * Restored from stable version.
         */
        function applyTransform(transform) {
            currentTransform = transform;
            root.attr("transform", transform.toString());

            // Critical for Bird View: update data attributes
            svg.attr("data-zoom-scale", String(transform.k));
            svg.attr("data-pan-x", String(transform.x));
            svg.attr("data-pan-y", String(transform.y));

            // Notify parent for bird view synchronization
            if (window.parent) {
                window.parent.postMessage({
                    type: "mainTransform",
                    k: transform.k,
                    x: transform.x,
                    y: transform.y
                }, "*");
            }
        }

        /**
         * Focuses the view on a specific node.
         * Restored from stable version.
         */
        function focusNode(nodeId) {
            if (!scrollContainer || !nodeId) return;
            const center = getNodeCenter(String(nodeId));
            if (!center) return;

            const scale = currentTransform.k || 1;
            const targetX = (scrollContainer.clientWidth / 2) - (center.x * scale);
            const targetY = (scrollContainer.clientHeight / 2) - (center.y * scale);

            const nextTransform = d3.zoomIdentity.translate(targetX, targetY).scale(scale);
            svg.transition().duration(220).call(zoom.transform, nextTransform);
        }

        function setSelectedNode(nodeId) {
            selectedNodeId = (nodeId === null || nodeId === undefined || nodeId === "") ? null : String(nodeId);
            nodeSelection.classed("selected", function() {
                return this.getAttribute("data-node-id") === selectedNodeId;
            });
        }

        // --- Interaction Handlers ---

        function positionTooltip(event) {
            tooltipEl.style.display = "block";
            const offset = 15;
            let x = event.clientX + offset;
            let y = event.clientY + offset;
            const rect = tooltipEl.getBoundingClientRect();
            if (x + rect.width > window.innerWidth - 10) x = window.innerWidth - rect.width - 10;
            if (y + rect.height > window.innerHeight - 10) y = window.innerHeight - rect.height - 10;
            tooltipEl.style.left = x + "px";
            tooltipEl.style.top = y + "px";
        }

        function hideTooltip() { tooltipEl.style.display = "none"; }

        function showNodeTooltip(e, el) {
            const id = el.getAttribute("data-node-id");
            const attrs = readAttrs(el);
            let html = `<div class="tooltip-title">Node: ${escapeHtml(id)}</div>`;
            const keys = Object.keys(attrs);
            if (keys.length > 0) {
                keys.forEach(k => {
                    html += `<div class="tooltip-attr"><b>${escapeHtml(k)}:</b> ${escapeHtml(attrs[k])}</div>`;
                });
            } else {
                html += `<div>No attributes</div>`;
            }
            tooltipEl.innerHTML = html;
            positionTooltip(e);
        }

        function showEdgeTooltip(e, el) {
            const id = el.getAttribute("data-edge-id") || "unnamed";
            const src = el.getAttribute("data-source");
            const tgt = el.getAttribute("data-target");
            const attrs = readAttrs(el);
            let html = `<div class="tooltip-title">Edge: ${escapeHtml(id)}</div>`;
            html += `<div><b>From:</b> ${escapeHtml(src)}</div>`;
            html += `<div><b>To:</b> ${escapeHtml(tgt)}</div><hr style="border:0;border-top:1px solid #eee;margin:4px 0">`;
            Object.keys(attrs).forEach(k => {
                html += `<div class="tooltip-attr"><b>${escapeHtml(k)}:</b> ${escapeHtml(attrs[k])}</div>`;
            });
            tooltipEl.innerHTML = html;
            positionTooltip(e);
        }

        // --- D3 Behaviors ---

        const zoom = d3.zoom()
            .scaleExtent([0.1, 5])
            .filter(event => {
                // Prevent zoom when scrolling inside node tables
                if (event.type === "wheel") {
                    const target = event.target;
                    if (target && target.closest(".attr-scroll-area.scroll-active")) return false;
                }
                // Prevent pan when dragging nodes
                if (event.type === "mousedown") {
                    const target = event.target;
                    if (target && target.closest("[data-node-id]")) return false;
                }
                return !event.ctrlKey && event.type !== "dblclick";
            })
            .on("zoom", event => {
                applyTransform(event.transform);
            });

        const drag = d3.drag()
            .on("start", (event) => {
                hideTooltip();
                if (event.sourceEvent) event.sourceEvent.stopPropagation();
            })
            .on("drag", function (event) {
                const nodeId = this.getAttribute("data-node-id");
                const pos = nodePositions.get(nodeId);
                if (!pos) return;

                // Adjust for current scale
                pos.x += event.dx / currentTransform.k;
                pos.y += event.dy / currentTransform.k;

                d3.select(this).attr("x", pos.x).attr("y", pos.y);
                updateEdgesForNode(nodeId);
            });

        // --- Setup Listeners ---

        svg.call(zoom);
        svg.on("dblclick.zoom", null);

        nodeSelection
            .call(drag)
            .on("mouseenter", function(e) { showNodeTooltip(e, this); })
            .on("mousemove", positionTooltip)
            .on("mouseleave", hideTooltip)
            .on("click", function (event) {
                if (event.defaultPrevented) return;
                const nodeId = this.getAttribute("data-node-id");
                setSelectedNode(nodeId);
                focusNode(nodeId); // Added back to match stable behavior
                if (window.parent) {
                    window.parent.postMessage({ type: "nodeSelected", nodeId: nodeId }, "*");
                    window.parent.postMessage({ type: "selectNode", nodeId: nodeId }, "*");
                }
            });

        edgeGroups
            .on("mouseenter", function(e) { showEdgeTooltip(e, this); })
            .on("mousemove", positionTooltip)
            .on("mouseleave", hideTooltip);

        // Initial transform sync
        applyTransform(d3.zoomIdentity);

        window.addEventListener("message", function (event) {
            const message = event.data;
            if (message && message.type === "selectNode") {
                setSelectedNode(message.nodeId);
            }
            if (message && message.type === "focusNode") {
                focusNode(message.nodeId);
            }
        });
    })();
</script>
</body>
</html>
